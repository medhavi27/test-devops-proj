version: '3.8'

services:
  web-app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://admin:secretpass@menu-db:5432/restaurant_db
      - PYTHONUNBUFFERED=1  # <--- ADD THIS LINE! Forces Python logs to show instantly
      - DD_AGENT_HOST=datadog-agent  # Tells your Python code where the agent is
      - DD_TRACE_AGENT_URL=http://datadog-agent:8126 # For APM
    depends_on:
      - menu-db
      - datadog-agent

  menu-db:
    image: postgres:15
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=secretpass
      - POSTGRES_DB=restaurant_db
    ports:
      - "5432:5432"

  datadog-agent:
    image: gcr.io/datadoghq/agent:latest
    environment:
      - DD_API_KEY=${DD_API_KEY} # It will pull this from your local .env
      - DD_SITE=datadoghq.eu
      - DD_APM_NON_LOCAL_TRAFFIC=true # Allows the web-app to talk to it
      - DD_DOGSTATSD_NON_LOCAL_TRAFFIC=true
      - DD_HOSTNAME=my-local-dev-app  # <--- ADD THIS
      - DD_DOGSTATSD_NON_LOCAL_TRAFFIC=true # <--- ADD THIS
    ports:
      - "8125:8125/udp"
      - "8126:8126"