name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run tests
        run: unittest test_app.py -v

  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: test  # Only runs if tests pass — just like Blazar blocking Orion
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to AWS App Runner
        run: echo "Deploy step — configured in Step 5"